<!DOCTYPE html>
<html lang="nl-BE">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pagina niet gevonden — Leuven Laadpaal</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#15171B" />
<link rel="icon" href="/favicon.ico" sizes="32x32" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#15171B;--voltgeel:#FFC400;--diep:#101114;--body:#C3C6CD}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-content:center;text-align:center;gap:18px;padding:40px;
    background:var(--ink);color:var(--body);font-family:"Archivo",system-ui,sans-serif;line-height:1.6;overflow-x:hidden}
  .code{font-family:"IBM Plex Mono",monospace;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--voltgeel)}
  h1{font-family:"Anton",sans-serif;text-transform:uppercase;font-weight:400;letter-spacing:-0.01em;line-height:0.94;
    color:#fff;font-size:clamp(2.6rem,9vw,5.5rem);margin:0}
  p{margin:0 auto;max-width:46ch;font-size:17px}
  .btn{display:inline-flex;align-items:center;gap:9px;background:var(--voltgeel);color:var(--diep);
    font-weight:600;font-size:15px;text-decoration:none;padding:13px 22px;border-radius:2px;margin-top:8px}
  .btn:hover{filter:brightness(1.05)}
  .plug{display:block;margin:0 auto}
  :focus-visible{outline:2px solid var(--voltgeel);outline-offset:3px}
</style>
</head>
<body>
  <svg class="plug" width="48" height="48" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="12" cy="13" r="9.2" fill="none" stroke="#FFC400" stroke-width="2"/>
    <line x1="6" y1="6.2" x2="18" y2="6.2" stroke="#FFC400" stroke-width="2"/>
    <circle cx="8" cy="14" r="1.4" fill="#FFC400"/><circle cx="12" cy="15" r="1.4" fill="#FFC400"/><circle cx="16" cy="14" r="1.4" fill="#FFC400"/>
  </svg>
  <p class="code">Fout 404 — geen verbinding</p>
  <h1>Deze pagina<br>bestaat niet.</h1>
  <p>De link die je volgde, leidt nergens heen. Keer terug naar de startpagina en vraag je vrijblijvende offerte.</p>
  <a class="btn" href="/">Terug naar home</a>
</body>
</html>
